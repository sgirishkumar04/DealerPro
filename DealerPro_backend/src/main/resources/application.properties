server.port=8083
spring.application.name=DealerProApplication

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000
spring.data.redis.database=0

# Redis Connection Pool
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# Cache Configuration
spring.cache.type=none
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=dealerpro:

# Enable caching
spring.cache.cache-names=leads,dealers,managers,vehicles,inventory,sales,testDrives,serviceOrders,parts,analytics,finance

# Database Configuration - SQLite (Default)
spring.datasource.url=jdbc:sqlite:../db/DealerPro.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=DealerProHikariPool
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging Configuration - See QueryDSL Generated SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.querydsl.jpa=DEBUG

# Security Configuration
app.jwt-secret=9a4f2c8d3b7a1e5f0d9c8b7a6e5f4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0d9c8b7a6e5f4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e

# Account Lock Configuration
app.security.max-login-attempts=5
app.security.lock-duration-minutes=10
app.security.jwt-secret=9a4f2c8d3b7a1e5f0d9c8b7a6e5f4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0d9c8b7a6e5f4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e

# Database Configuration
app.database.type=sqlite
app.database.sync.enabled=false
app.database.sync.path=../db/DealerPro.db
app.database.sync.interval-minutes=30

# Cache Configuration
app.cache.enabled=true
app.cache.ttl-minutes=5
app.cache.cache-names=leads,dealers,managers,vehicles,inventory,sales,testDrives,serviceOrders,parts,analytics,finance

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false

# Disable OpenAI Auto-configuration (requires API key)
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# Spring Batch Configuration
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

